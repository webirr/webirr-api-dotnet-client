name: Publish NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 1.1.0.
        required: true
        type: string
      nuget_user:
        description: NuGet.org username/profile name, not an email address.
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build, test, pack, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version and NuGet user
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            package_version="${{ inputs.version }}"
            nuget_user="${{ inputs.nuget_user }}"
          else
            package_version="${GITHUB_REF_NAME#v}"
            nuget_user="${{ vars.NUGET_USER }}"
          fi

          if [ -z "$package_version" ]; then
            echo "Package version is required." >&2
            exit 1
          fi

          if [ -z "$nuget_user" ]; then
            echo "NuGet user is required. Set repository variable NUGET_USER for tag publishing." >&2
            exit 1
          fi

          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "NUGET_USER=$nuget_user" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore WeBirr.sln

      - name: Test
        run: dotnet test WeBirr.sln --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack WeBirr/WeBirr.csproj
          --configuration Release
          --no-restore
          --output artifacts
          -p:Version=${{ env.PACKAGE_VERSION }}
          -p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: NuGet trusted publishing login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ env.NUGET_USER }}

      - name: Publish package
        run: >
          dotnet nuget push artifacts/WeBirr.${{ env.PACKAGE_VERSION }}.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
